# Conda environment used to train and evaluate the predict-power baseline.
#
# Build:    conda env create -p ./conda_envs/predict-power -f environment.yml
# Activate: conda activate ./conda_envs/predict-power

name: predict-power
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.10
  - pip
  - pytorch=2.3.1
  - pytorch-cuda=11.8
  - cudnn=8.9
  - numpy>=1.26,<2
  - pandas>=2.0
  - matplotlib>=3.8
  - xarray>=2024.1
  - netcdf4>=1.6
  - scikit-learn>=1.3
  - tqdm>=4.66
  - pip:
    - -r requirements.txt
